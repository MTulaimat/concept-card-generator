<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#00ADB5" />
  <title>Concept Word Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>

<body x-data="cardData" class="bg-[#EEEEEE] text-gray-900 flex justify-center">
  <div class="max-w-md w-full min-h-screen pb-24">
    <!-- Header -->
    <header class="bg-[#00ADB5] text-white shadow-md rounded-b-2xl p-4 relative">
      <button x-cloak x-show="showCardsPage" @click="backToMenu()" aria-label="Back to menu"
        class="absolute left-3 top-1/2 -translate-y-1/2 w-10 h-10 flex items-center justify-center rounded-full bg-white/20 hover:bg-white/30 active:scale-90 transition text-xl leading-none">
        &#8592;
      </button>
      <h1 class="text-xl font-bold text-center">Concept Card Generator</h1>
      <p x-cloak x-show="showCardsPage" class="text-center text-white/80 text-sm mt-1 truncate px-12"
        x-text="gameName"></p>
    </header>

    <!-- Game Page -->
    <div class="mt-6" x-cloak x-show="showCardsPage" x-transition.opacity.duration.300ms>

      <!-- Reshuffle notice -->
      <div x-cloak x-show="showReshuffleNotice" x-transition.opacity.duration.300ms
        class="mx-auto mb-3 w-fit px-4 py-1.5 rounded-full bg-amber-100 border border-amber-300 text-amber-800 text-sm font-semibold">
        &#128256; Deck finished &mdash; reshuffled!
      </div>

      <!-- Card (3D flip) -->
      <section class="text-center px-4">
        <div class="flip-scene w-[22rem] max-w-full mx-auto">
          <div class="flip-card" :class="{ 'is-flipped': cardFlipped }">

            <!-- Front: the generated card -->
            <div id="card" class="flip-face flip-front flex flex-col items-center gap-4 p-8 shadow-cstm rounded-xl bg-white">
              <template x-for="level in ['easy', 'medium', 'hard']" :key="level">
                <div
                  class="relative min-h-24 w-full border-4 flex flex-col justify-center items-center gap-3 rounded-tl-2xl rounded-br-2xl py-4 px-5"
                  :style="'border-color: ' + data.cards[level].color;">
                  <div
                    class="text-xl scale-[1.75] absolute top-0 right-0 translate-x-1/2 -translate-y-1/2"
                    x-text="data.cards[level].emoji"></div>

                  <template x-for="(word, idx) in currentWords[level]" :key="level + '-' + idx">
                    <p class="relative w-full capitalize font-bold break-words"
                      :class="isArabic ? 'text-xl leading-relaxed' : 'text-base leading-snug'"
                      :dir="isArabic ? 'rtl' : 'ltr'" x-text="word"></p>
                  </template>

                  <div
                    class="absolute rotate-[-90deg] text-[.8rem] font-bold left-[-2px] top-1/2 px-2 size-fit flex items-center justify-center rounded-full -translate-x-1/2 -translate-y-1/2 text-white whitespace-nowrap"
                    x-text="data.cards[level].label[settings.language]"
                    :style="'background-color: ' + data.cards[level].color"></div>
                </div>
              </template>
            </div>

            <!-- Back: decorative card back -->
            <div class="flip-face flip-back rounded-xl shadow-cstm card-back-pattern">
              <div class="flex flex-col items-center justify-center gap-4">
                <div class="w-24 h-24 rounded-full bg-white/95 flex items-center justify-center shadow-lg">
                  <span class="text-5xl font-black text-[#00ADB5]">?</span>
                </div>
                <p class="text-white font-bold tracking-[.3em] text-sm uppercase">Concept</p>
                <div class="flex gap-2">
                  <span class="w-3 h-3 rounded-full bg-[#16A34A]"></span>
                  <span class="w-3 h-3 rounded-full bg-[#F59E0B]"></span>
                  <span class="w-3 h-3 rounded-full bg-[#DC2626]"></span>
                </div>
              </div>
            </div>

          </div>
        </div>
      </section>

      <!-- Progress -->
      <section class="text-center mt-5 px-8">
        <p class="text-sm font-semibold text-gray-600">
          Card <span class="text-gray-900" x-text="cardsReached"></span> of
          <span class="text-gray-900" x-text="totalCards"></span>
        </p>
        <div class="mt-2 h-2 w-full max-w-[22rem] mx-auto bg-gray-300 rounded-full overflow-hidden">
          <div class="h-full bg-[#00ADB5] rounded-full transition-all duration-500"
            :style="'width: ' + progressPercent + '%'"></div>
        </div>
      </section>

      <!-- Next card -->
      <section class="text-center mt-6 px-8">
        <button
          class="w-full max-w-[22rem] px-4 py-3.5 bg-[#00ADB5] hover:bg-[#009AA1] text-white text-lg font-bold rounded-xl shadow-md active:scale-95 transition disabled:opacity-60 disabled:active:scale-100"
          :disabled="isFlipping" @click="generateCard()">
          Next Card &#127922;
        </button>
      </section>

    </div>

    <!-- Settings Page -->
    <div class="px-5 mt-6 space-y-5" x-cloak x-show="!showCardsPage" x-transition.opacity.duration.300ms>

      <!-- New game setup -->
      <section class="bg-white rounded-2xl shadow-md p-5 space-y-4">
        <h2 class="text-lg font-bold">New Game</h2>

        <div>
          <label for="gameName" class="text-sm font-semibold text-gray-600">Game Name</label>
          <input type="text" id="gameName" x-model="gameName" placeholder="Optional — e.g. Family Night"
            class="mt-1 w-full px-3 py-2.5 border border-gray-300 rounded-xl bg-white focus:outline-none focus:ring-2 focus:ring-[#00ADB5]" />
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label for="language" class="text-sm font-semibold text-gray-600">Language</label>
            <select id="language" x-model="settings.language"
              class="mt-1 w-full px-3 py-2.5 border border-gray-300 rounded-xl bg-white focus:outline-none focus:ring-2 focus:ring-[#00ADB5]">
              <option value="english">English</option>
              <option value="arabic">العربية</option>
            </select>
          </div>
          <div>
            <label for="cardsPerDifficulty" class="text-sm font-semibold text-gray-600">Words / Level</label>
            <select id="cardsPerDifficulty" x-model.number="settings.cardsPerDifficulty"
              class="mt-1 w-full px-3 py-2.5 border border-gray-300 rounded-xl bg-white focus:outline-none focus:ring-2 focus:ring-[#00ADB5]">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
            </select>
          </div>
        </div>

        <button class="w-full px-4 py-3.5 bg-[#00ADB5] hover:bg-[#009AA1] text-white text-lg font-bold rounded-xl shadow-md active:scale-95 transition"
          @click="resetGame()">
          Start Game &#9654;
        </button>
      </section>

      <!-- Saved games -->
      <section class="bg-white rounded-2xl shadow-md p-5">
        <h2 class="text-lg font-bold">Saved Games</h2>

        <p x-show="savedGames.length === 0" class="mt-2 text-sm text-gray-500">
          No saved games yet &mdash; finished setting up? Hit Start Game!
        </p>

        <ul class="mt-3 space-y-3">
          <template x-for="save in savedGames" :key="save.key">
            <li class="flex justify-between items-center gap-3 border border-gray-200 p-3.5 rounded-xl bg-gray-50">
              <div class="flex flex-col min-w-0">
                <p class="text-md font-bold truncate" x-text="save.gameName"></p>
                <p class="text-xs text-gray-500 mt-0.5">
                  <span class="capitalize" x-text="save.language"></span>
                  &middot; <span x-text="save.cardsPerDifficulty"></span> words/level
                </p>
                <p class="text-xs text-gray-500 mt-0.5">
                  Card <span class="font-bold text-gray-700" x-text="save.cardsCompleted"></span> of
                  <span class="font-bold text-gray-700" x-text="save.totalCards"></span>
                </p>
              </div>

              <div class="flex gap-2 shrink-0">
                <button aria-label="Resume game"
                  class="w-10 h-10 flex items-center justify-center rounded-full bg-[#00ADB5]/10 text-[#00ADB5] hover:bg-[#00ADB5]/20 active:scale-90 transition"
                  @click="loadGame(save.key)">&#9654;</button>
                <button aria-label="Delete game"
                  class="w-10 h-10 flex items-center justify-center rounded-full bg-red-500/10 text-red-500 hover:bg-red-500/20 active:scale-90 transition"
                  @click="deleteGame(save.key)">&#10005;</button>
              </div>
            </li>
          </template>
        </ul>
      </section>

    </div>

    <!-- Footer -->
    <footer class="fixed bottom-0 w-full left-0 bg-gray-800 text-white text-center p-2">
      <p class="text-sm">
        Copyright &copy; 2025 Bing Shmigling&reg;. All rights NOT reserved.
      </p>
    </footer>
  </div>
</body>

</html>
